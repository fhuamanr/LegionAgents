apiVersion: batch/v1
kind: Job
metadata:
  name: multi-agent-qa-sandbox
spec:
  template:
    metadata:
      labels:
        app: multi-agent-qa-sandbox
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
      containers:
        - name: qa-sandbox
          image: multi-agent-delivery-qa-sandbox:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: multi-agent-qa-sandbox-config
            - secretRef:
                name: multi-agent-backend-secrets
          volumeMounts:
            - name: qa-artifacts
              mountPath: /app/outputs/qa_sandbox
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: qa-artifacts
          persistentVolumeClaim:
            claimName: multi-agent-qa-artifacts

