name: multi-agent-delivery-local

services:
  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/backend/Dockerfile
    env_file:
      - ../env/.env.local.example
    environment:
      APP_ENV: local
      STORAGE_ROOT: /app/outputs
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://platform:platform@postgres:5432/platform
    ports:
      - "8000:8000"
    volumes:
      - ../../outputs:/app/outputs
      - ../../agents:/app/agents:ro
      - ../../repository:/app/repository:ro

  frontend:
    build:
      context: ../..
      dockerfile: deployment/docker/frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_WS_BASE_URL: ws://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  qa-sandbox:
    build:
      context: ../..
      dockerfile: deployment/docker/qa-sandbox/Dockerfile
    env_file:
      - ../env/.env.local.example
    environment:
      APP_ENV: local
      QA_SANDBOX_ARTIFACT_ROOT: /app/outputs/qa_sandbox
    volumes:
      - ../../outputs/qa_sandbox:/app/outputs/qa_sandbox
    profiles:
      - qa

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    profiles:
      - infra

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - infra

volumes:
  redis-data:
  postgres-data:
