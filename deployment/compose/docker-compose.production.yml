name: multi-agent-delivery

services:
  backend:
    image: ${BACKEND_IMAGE:-multi-agent-delivery-backend:latest}
    restart: unless-stopped
    env_file:
      - ../env/.env.production.example
    environment:
      APP_ENV: production
      STORAGE_ROOT: /app/outputs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend-outputs:/app/outputs
      - backend-logs:/app/logs
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ${FRONTEND_IMAGE:-multi-agent-delivery-frontend:latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_WS_BASE_URL: ${PUBLIC_WS_BASE_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      backend:
        condition: service_healthy

  qa-sandbox:
    image: ${QA_SANDBOX_IMAGE:-multi-agent-delivery-qa-sandbox:latest}
    restart: "no"
    env_file:
      - ../env/.env.production.example
    environment:
      APP_ENV: production
      QA_SANDBOX_ARTIFACT_ROOT: /app/outputs/qa_sandbox
    volumes:
      - qa-sandbox-artifacts:/app/outputs/qa_sandbox
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles:
      - qa

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    profiles:
      - redis

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

volumes:
  backend-outputs:
  backend-logs:
  qa-sandbox-artifacts:
  redis-data:
  postgres-data:
