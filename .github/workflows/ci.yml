name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -p no:cacheprovider tests

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f deployment/docker/backend/Dockerfile -t multi-agent-delivery-backend:ci .
      - name: Build frontend image
        run: docker build -f deployment/docker/frontend/Dockerfile -t multi-agent-delivery-frontend:ci .
      - name: Build QA sandbox image
        run: docker build -f deployment/docker/qa-sandbox/Dockerfile -t multi-agent-delivery-qa-sandbox:ci .

