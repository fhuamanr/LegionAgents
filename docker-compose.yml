name: ai-delivery-platform

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-local}
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  STORAGE_ROOT: /app/outputs
  QA_SANDBOX_ARTIFACT_ROOT: /app/outputs/qa_sandbox
  REDIS_URL: redis://redis:6379/0
  POSTGRES_DSN: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-platform}
  QDRANT_URL: http://qdrant:6333
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-platform}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-platform-secret}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  DATADOG_API_KEY: ${DATADOG_API_KEY:-}

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - edge
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: deployment/docker/frontend/Dockerfile.dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8080/api}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://127.0.0.1:8080}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next-cache:/app/.next
    expose:
      - "3000"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - app
      - edge
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/dashboard >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: deployment/docker/backend/Dockerfile.dev
    restart: unless-stopped
    env_file:
      - deployment/env/.env.compose.example
    environment:
      <<: *backend-env
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./app:/app/app
      - ./core:/app/core
      - ./agents:/app/agents:ro
      - ./repository:/app/repository:ro
      - ./workflows:/app/workflows
      - ./outputs:/app/outputs
      - backend-logs:/app/logs
    expose:
      - "8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - app
      - data
      - sandbox
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 10

  langgraph-runtime:
    build:
      context: .
      dockerfile: deployment/docker/backend/Dockerfile.dev
    restart: unless-stopped
    env_file:
      - deployment/env/.env.compose.example
    environment:
      <<: *backend-env
      RUNTIME_ROLE: langgraph-worker
    command: ["python", "-m", "core.graph.worker"]
    volumes:
      - ./core:/app/core
      - ./agents:/app/agents:ro
      - ./repository:/app/repository:ro
      - ./outputs:/app/outputs
    networks:
      - app
      - data
      - sandbox
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import core.graph; print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-platform}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-platform-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-platform}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-platform-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-ai-delivery-artifacts}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc anonymous set none "local/$${MINIO_BUCKET}"
    networks:
      - data
    depends_on:
      minio:
        condition: service_healthy

  playwright-sandbox:
    build:
      context: .
      dockerfile: deployment/docker/playwright-sandbox/Dockerfile.dev
    restart: unless-stopped
    environment:
      <<: *backend-env
      SANDBOX_ENGINE: playwright
      QA_SANDBOX_ARTIFACT_ROOT: /app/outputs/qa_sandbox/playwright
    volumes:
      - ./core:/app/core
      - ./tests:/app/tests
      - ./outputs/qa_sandbox/playwright:/app/outputs/qa_sandbox/playwright
    networks:
      - sandbox
      - app
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "python", "-c", "import core.qa_sandbox; print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 5

  selenium-sandbox:
    image: selenium/standalone-chromium:4.27.0
    restart: unless-stopped
    shm_size: "2gb"
    environment:
      SE_NODE_MAX_SESSIONS: ${SELENIUM_MAX_SESSIONS:-2}
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
      SE_START_XVFB: "true"
    ports:
      - "${SELENIUM_PORT:-4444}:4444"
      - "${SELENIUM_VNC_PORT:-7900}:7900"
    volumes:
      - selenium-downloads:/home/seluser/Downloads
      - ./outputs/qa_sandbox/selenium:/opt/selenium/assets
    networks:
      - sandbox
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://127.0.0.1:4444/status | grep -q '\"ready\":true'"]
      interval: 20s
      timeout: 5s
      retries: 10

networks:
  edge:
    driver: bridge
  app:
    driver: bridge
  data:
    driver: bridge
    internal: true
  sandbox:
    driver: bridge

volumes:
  frontend-node-modules:
  frontend-next-cache:
  backend-logs:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:
  selenium-downloads:

